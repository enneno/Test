<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Időpontfoglalás - Lumi Nails</title>
    <meta name="description" content="Lumi Nails online időpontfoglalás körömépítéshez, manikűrhöz és gél lakkhoz Tatabányán.">
    <meta property="og:title" content="Időpontfoglalás - Lumi Nails">
    <meta property="og:description" content="Válassz szolgáltatást, dátumot és szabad időpontot online.">
    <meta property="og:site_name" content="Lumi Nails">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://luminails.hu/foglalas/">
    <meta property="og:image" content="https://luminails.hu/kepek/social-preview.jpg">
    <meta property="og:image:width" content="1200">
    <meta property="og:image:height" content="630">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:image" content="https://luminails.hu/kepek/social-preview.jpg">
    <link rel="canonical" href="https://luminails.hu/foglalas/">
    <link rel="icon" type="image/svg+xml" href="/kepek/favicon.svg">
    <link rel="icon" type="image/png" sizes="32x32" href="/kepek/favicon-32.png">
    <link rel="apple-touch-icon" href="/kepek/apple-touch-icon.png">
    <link rel="stylesheet" href="/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@300;400;500;600;700&family=Montserrat:wght@300;400;600;700&display=swap"
        rel="stylesheet">
</head>

<body data-booking-mode="supabase">
    <div id="fejlec-helye"></div>

    <section>
        <h2>Időpontfoglalás</h2>
        <p class="szekcio-leiras urlap-leiras">Válassz szolgáltatást, dátumot és szabad időpontot. A foglalás után visszaigazoló üzenetet kapsz.</p>

        <form id="foglalas-urlap" class="urlap-kontener">
            <input type="text" id="foglalas-nev" class="urlap-mezo" placeholder="Teljes neved" autocomplete="name" required>

            <div class="tel-csoport">
                <span class="tel-prefix">+36</span>
                <input type="tel" id="foglalas-tel" class="urlap-mezo" placeholder="201234567" inputmode="numeric"
                    autocomplete="tel-national" required>
            </div>

            <input type="email" id="foglalas-email" class="urlap-mezo" placeholder="Email címed" autocomplete="email" required>

            <select id="foglalas-szolgatatas" class="urlap-mezo" required>
                <option value="" disabled selected>Szolgáltatások betöltése...</option>
            </select>

            <input type="date" id="foglalas-datum" class="urlap-mezo" required>

            <select id="foglalas-ido" class="urlap-mezo" required>
                <option value="" disabled selected>Előbb válassz szolgáltatást és dátumot...</option>
            </select>

            <textarea id="foglalas-komment" class="urlap-mezo" rows="3"
                placeholder="Megjegyzés, egyedi kérés (opcionális)"></textarea>

            <button type="submit" id="foglalas-kuldes" class="gomb urlap-kuldes-gomb">Foglalás elküldése</button>
            <p id="foglalas-status" class="urlap-status" aria-live="polite"></p>
        </form>
    </section>

    <div id="lablec-helye"></div>

    <div id="sikeres-popup" class="popup-hatter">
        <div class="popup-doboz">
            <h3 class="popup-cim">Foglalás elküldve</h3>
            <p class="popup-szoveg">Köszönöm, megkaptam a foglalásodat. Hamarosan visszajelzek a megadott elérhetőségen.</p>

            <div class="popup-gomb-sor">
                <a href="/" class="gomb popup-gomb">Kezdőlap</a>
                <a href="/galeria/" class="gomb popup-gomb">Galéria</a>
                <a href="#" id="naptar-link" class="gomb popup-gomb" hidden>Naptárba mentés</a>
            </div>

            <button type="button" id="popup-bezaras" class="bezaro-link">Bezárás</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/supabase-config.js"></script>
    <script src="/script.js"></script>
    <script src="/booking.js"></script>
</body>

</html>
