<!DOCTYPE html>
<html lang="hu">
<link rel="stylesheet" href="style.css">
<div id="fejlec-helye"></div>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Időpontfoglalás - Lumi Nails</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600&family=Playball&display=swap"
        rel="stylesheet">
</head>

<body>

    <section>
        <h2>Időpontfoglalás</h2>
        <p style="text-align: center; color: #a0a0a0; font-weight: 300; margin-bottom: 40px;">Töltsd ki az adatokat, és
            küldd el nekem üzenetben!</p>

        <div class="urlap-kontener">
            <input type="text" id="foglalas-nev" class="urlap-mezo" placeholder="Teljes neved" required>

            <div class="tel-csoport">
                <span class="tel-prefix">+36</span>
                <input type="tel" id="foglalas-tel" class="urlap-mezo" placeholder="201234567"
                    oninput="csakSzamokatEnged(this)" required>
            </div>

            <select id="foglalas-szolgatatas" class="urlap-mezo" required>
                <option value="" disabled selected>Válassz szolgáltatást...</option>
                <option value="Körömépítés">Körömépítés </option>
                <option value="Manikűr">Manikűr</option>
                <option value="Műköröm eltávolítás">Műköröm leszedés + Manikűr</option>
            </select>

            <input type="date" id="foglalas-datum" class="urlap-mezo" required>

            <select id="foglalas-ido" class="urlap-mezo" required>
                <option value="" disabled selected>Válassz időpontot...</option>
            </select>

            <textarea id="foglalas-komment" class="urlap-mezo" rows="3"
                placeholder="Megjegyzés, egyedi kérés (Opcionális)"></textarea>

            <button onclick="foglalasInditasa()" class="gomb"
                style="width: 100%; border: none; font-weight: 600; background-color: #d4af37; color: #000;">Adatok
                másolása & Tovább</button>
        </div>
    </section>

    <div id="sikeres-popup" class="popup-hatter">
        <div class="popup-doboz">
            <h3 style="color: #d4af37; margin-bottom: 10px;">Adatok másolva! ✓</h3>
            <p style="color: #a0a0a0; font-size: 14px; font-weight: 300;">A foglalásod szövegét vágólapra másoltuk.
                Válaszd ki, hol szeretnéd elküldeni nekem, majd nyomj a <b>Beillesztés</b> (Paste) gombra a chaten!</p>

            <div class="popup-gomb-sor">
                <a href="https://m.me/100005112737265" target="_blank" class="gomb"
                    style="margin: 0; padding: 10px 20px; font-size: 11px;">Messenger</a>
                <a href="https://ig.me/m/luminails.xx" target="_blank" class="gomb"
                    style="margin: 0; padding: 10px 20px; font-size: 11px;">Instagram</a>
            </div>

            <span onclick="popupBezarasa()" class="bezaro-link">Mégse, visszalépek</span>
        </div>
    </div>
<script src="script.js"></script>
</body>

</html>
