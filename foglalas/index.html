<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Időpontfoglalás - Lumi Nails</title>
    <meta name="description" content="Lumi Nails online időpontfoglalás körömépítéshez, manikűrhöz és gél lakkhoz.">
    <meta property="og:title" content="Időpontfoglalás - Lumi Nails">
    <meta property="og:description" content="Készítsd elő a foglalási adataidat, majd küldd el üzenetben.">
    <meta property="og:site_name" content="Lumi Nails">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://luminails.hu/foglalas/">
    <meta property="og:image" content="https://luminails.hu/kepek/hatter2.jpg">

    <link rel="canonical" href="https://luminails.hu/foglalas/">
    <link rel="stylesheet" href="/style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@300;400;500;600;700&family=Montserrat:wght@300;400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="fejlec-helye"></div>

    <section>
        <h2>Időpontfoglalás</h2>
        <p class="szekcio-leiras urlap-leiras">Töltsd ki az adatokat, és
            küldd el nekem üzenetben!</p>

        <div class="urlap-kontener">
            <input type="text" id="foglalas-nev" class="urlap-mezo" placeholder="Teljes neved" required>

            <div class="tel-csoport">
                <span class="tel-prefix">+36</span>
                <input type="tel" id="foglalas-tel" class="urlap-mezo" placeholder="201234567" inputmode="numeric"
                    required>
            </div>

            <select id="foglalas-szolgatatas" class="urlap-mezo" required>
                <option value="" disabled selected>Válassz szolgáltatást...</option>
                <option value="Körömépítés - 1 óra 00 perc">Körömépítés - 1 óra 00 perc</option>
                <option value="Töltés - 1 óra 00 perc">Töltés - 1 óra 00 perc</option>
                <option value="Manikűr - 1 óra 00 perc">Manikűr - 1 óra 00 perc</option>
                <option value="Gél lakk - 1 óra 00 perc">Gél lakk - 1 óra 00 perc</option>
                <option value="Gél lakk leszedés + manikűr - 1 óra 00 perc">Gél lakk leszedés + manikűr - 1 óra 00 perc</option>
                <option value="Műköröm leszedés + manikűr - 1 óra 00 perc">Műköröm leszedés + manikűr - 1 óra 00 perc</option>
                <option value="Díszítés / nail art - 1 óra 00 perc">Díszítés / nail art - 1 óra 00 perc</option>
            </select>

            <input type="date" id="foglalas-datum" class="urlap-mezo" required>

            <select id="foglalas-ido" class="urlap-mezo" required>
                <option value="" disabled selected>Válassz időpontot...</option>
            </select>

            <textarea id="foglalas-komment" class="urlap-mezo" rows="3"
                placeholder="Megjegyzés, egyedi kérés (Opcionális)"></textarea>

            <button type="button" id="foglalas-kuldes" class="gomb urlap-kuldes-gomb">Foglalási adatok
                másolása & Tovább</button>
        </div>
    </section>

    <div id="lablec-helye"></div>

    <div id="sikeres-popup" class="popup-hatter">
        <div class="popup-doboz">
            <h3 class="popup-cim">Adatok másolva! ✓</h3>
            <p class="popup-szoveg">A foglalásod szövegét vágólapra másoltuk.
                Válaszd ki, hol szeretnéd elküldeni nekem, majd nyomj a <b>Beillesztés</b> (Paste) gombra a chaten!</p>
            <textarea id="popup-uzenet" class="popup-uzenet" readonly></textarea>

            <div class="popup-gomb-sor">
                <a href="https://m.me/100005112737265" target="_blank" class="gomb popup-gomb">Messenger</a>
                <a href="https://ig.me/m/luminails.xx" target="_blank" class="gomb popup-gomb">Instagram</a>
            </div>

            <button type="button" id="popup-bezaras" class="bezaro-link">Mégse, visszalépek</button>
        </div>
    </div>
<script src="/script.js"></script>
</body>

</html>
