<!DOCTYPE html>
<html lang="hu">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Galéria - Lumi Nails</title>
    <meta name="description" content="Lumi Nails galéria korábbi köröm munkákkal, manikűrrel, gél lakkal és nail art inspirációkkal.">
    <meta property="og:title" content="Galéria - Lumi Nails">
    <meta property="og:description" content="Korábbi Lumi Nails munkák, színek, formák és díszítések inspirációként.">
    <meta property="og:site_name" content="Lumi Nails">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://luminails.hu/galeria/">
    <meta property="og:image" content="https://luminails.hu/galeria/image3.jpeg">
    <meta name="twitter:card" content="summary_large_image">
    <link rel="canonical" href="https://luminails.hu/galeria/">
    <link rel="stylesheet" href="/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@300;400;500;600;700&family=Montserrat:wght@300;400;600;700&display=swap"
        rel="stylesheet">
</head>

<body>
    <div id="fejlec-helye"></div>

    <section class="galeria-oldal">
        <h2>Galéria</h2>
        <p class="szekcio-leiras">Finom részletek, letisztult formák és visszafogottan elegáns díszítések egy helyen.</p>

        <div class="galeria-racs">
            <button type="button" class="galeria-kep-gomb magas" data-src="/galeria/image3.jpeg" data-alt="Lumi Nails köröm munka">
                <img src="/galeria/image3.jpeg" alt="Lumi Nails köröm munka" loading="lazy">
            </button>
            <button type="button" class="galeria-kep-gomb magas" data-src="/galeria/image8.jpeg" data-alt="Lumi Nails díszített köröm">
                <img src="/galeria/image8.jpeg" alt="Lumi Nails díszített köröm" loading="lazy">
            </button>
            <button type="button" class="galeria-kep-gomb magas" data-src="/galeria/image6.jpeg" data-alt="Lumi Nails elegáns manikűr">
                <img src="/galeria/image6.jpeg" alt="Lumi Nails elegáns manikűr" loading="lazy">
            </button>
            <button type="button" class="galeria-kep-gomb" data-src="/galeria/image0.jpeg" data-alt="Lumi Nails köröm inspiráció">
                <img src="/galeria/image0.jpeg" alt="Lumi Nails köröm inspiráció" loading="lazy">
            </button>
            <button type="button" class="galeria-kep-gomb" data-src="/galeria/image1.jpeg" data-alt="Lumi Nails gél lakk munka">
                <img src="/galeria/image1.jpeg" alt="Lumi Nails gél lakk munka" loading="lazy">
            </button>
            <button type="button" class="galeria-kep-gomb" data-src="/galeria/image2.jpeg" data-alt="Lumi Nails körömdíszítés">
                <img src="/galeria/image2.jpeg" alt="Lumi Nails körömdíszítés" loading="lazy">
            </button>
            <button type="button" class="galeria-kep-gomb" data-src="/galeria/image4.jpeg" data-alt="Lumi Nails manikűr részlet">
                <img src="/galeria/image4.jpeg" alt="Lumi Nails manikűr részlet" loading="lazy">
            </button>
            <button type="button" class="galeria-kep-gomb" data-src="/galeria/image5.jpeg" data-alt="Lumi Nails letisztult köröm">
                <img src="/galeria/image5.jpeg" alt="Lumi Nails letisztult köröm" loading="lazy">
            </button>
            <button type="button" class="galeria-kep-gomb" data-src="/galeria/image7.jpeg" data-alt="Lumi Nails szalonmunka">
                <img src="/galeria/image7.jpeg" alt="Lumi Nails szalonmunka" loading="lazy">
            </button>
            <button type="button" class="galeria-kep-gomb" data-src="/galeria/image9.jpeg" data-alt="Lumi Nails köröm szín">
                <img src="/galeria/image9.jpeg" alt="Lumi Nails köröm szín" loading="lazy">
            </button>
            <button type="button" class="galeria-kep-gomb" data-src="/galeria/image10.jpeg" data-alt="Lumi Nails elegáns köröm">
                <img src="/galeria/image10.jpeg" alt="Lumi Nails elegáns köröm" loading="lazy">
            </button>
            <button type="button" class="galeria-kep-gomb" data-src="/galeria/image11.jpeg" data-alt="Lumi Nails köröm forma">
                <img src="/galeria/image11.jpeg" alt="Lumi Nails köröm forma" loading="lazy">
            </button>
            <button type="button" class="galeria-kep-gomb" data-src="/galeria/image12.jpeg" data-alt="Lumi Nails nail art">
                <img src="/galeria/image12.jpeg" alt="Lumi Nails nail art" loading="lazy">
            </button>
        </div>

        <a href="/foglalas/" class="gomb">Időpontfoglalás</a>
    </section>

    <div id="lablec-helye"></div>

    <div class="galeria-lightbox" id="galeria-lightbox" aria-hidden="true">
        <button type="button" class="galeria-lightbox-bezar" aria-label="Galéria bezárása">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M18 6 6 18"></path>
                <path d="m6 6 12 12"></path>
            </svg>
        </button>
        <button type="button" class="galeria-lightbox-elozo" aria-label="Előző kép">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M15 18l-6-6 6-6"></path>
            </svg>
        </button>
        <img src="" alt="">
        <button type="button" class="galeria-lightbox-kovetkezo" aria-label="Következő kép">
            <svg viewBox="0 0 24 24" aria-hidden="true">
                <path d="M9 18l6-6-6-6"></path>
            </svg>
        </button>
    </div>

    <script src="/script.js"></script>
</body>

</html>
